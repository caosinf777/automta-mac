name: Build & Release AutoMTA Mac

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags: v1.0.0, v1.2.3-beta, etc.
  workflow_dispatch:   # Allow manual trigger from GitHub UI
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: false
        default: 'dev'

env:
  NODE_VERSION: '18'
  ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-builder-cache

jobs:
  # ─── Build for macOS ─────────────────────────────────────────────────────────
  build-mac:
    name: Build DMG (macOS)
    runs-on: macos-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            automta-mac/package-lock.json

      # Cache Electron binaries to speed up builds
      - name: 📦 Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_CACHE }}
          key: electron-${{ runner.os }}-${{ hashFiles('automta-mac/package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: 📦 Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-builder-${{ runner.os }}-${{ hashFiles('automta-mac/package-lock.json') }}

      # Install frontend dependencies
      - name: 📦 Install frontend deps
        run: npm ci

      # Install Electron app dependencies
      - name: 📦 Install Electron deps
        run: cd automta-mac && npm ci
        env:
          ELECTRON_CACHE: ${{ env.ELECTRON_CACHE }}

      # Create .env for the build
      - name: 🔧 Create .env for build
        run: |
          cat > .env.production << EOF
          REACT_APP_API_URL=${{ secrets.VITE_API_URL || 'https://api.automta.au/api' }}
          VITE_API_URL=${{ secrets.VITE_API_URL || 'https://api.automta.au/api' }}
          EOF

      # Build React app (Vite)
      - name: 🏗️ Build React app
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.automta.au/api' }}
          NODE_OPTIONS: '--max-old-space-size=8192'

      # Compile TypeScript Electron files
      - name: 🏗️ Build Electron TypeScript
        run: cd automta-mac && npx tsc -p tsconfig.electron.json

      # Import Apple Developer certificate for code signing
      - name: 🔐 Import Apple signing certificate
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      # Build DMG for Apple Silicon (arm64)
      - name: 📦 Build DMG (Apple Silicon - arm64)
        run: cd automta-mac && npm run dist:dmg -- --arch arm64
        env:
          ELECTRON_CACHE: ${{ env.ELECTRON_CACHE }}
          ELECTRON_BUILDER_CACHE: ${{ env.ELECTRON_BUILDER_CACHE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Build DMG for Intel (x64)
      - name: 📦 Build DMG (Intel - x64)
        run: cd automta-mac && npm run dist:dmg -- --arch x64
        env:
          ELECTRON_CACHE: ${{ env.ELECTRON_CACHE }}
          ELECTRON_BUILDER_CACHE: ${{ env.ELECTRON_BUILDER_CACHE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Upload artifacts for inspection
      - name: 📤 Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: automta-mac-dmg
          path: |
            automta-mac/release/*.dmg
            automta-mac/release/*.zip
          retention-days: 30

      # Get version from tag or package.json
      - name: 🏷️ Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v$(node -p "require('./automta-mac/package.json').version")-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # Create GitHub Release with DMG downloads
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: AutoMTA ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          body: |
            ## AutoMTA para Mac ${{ steps.version.outputs.version }}
            
            ### ⬇️ Descarga
            
            | Chip | Descarga |
            |------|----------|
            | 🍎 Apple Silicon (M1/M2/M3/M4) | [AutoMTA-arm64.dmg](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/AutoMTA-${{ steps.version.outputs.version }}-arm64.dmg) |
            | 💻 Intel x64 | [AutoMTA-x64.dmg](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/AutoMTA-${{ steps.version.outputs.version }}-x64.dmg) |
            
            ### 🛠️ Instalación
            1. Descarga el DMG según tu chip
            2. Abre el DMG y arrastra AutoMTA a Aplicaciones
            3. Inicia sesión con tu cuenta de [automta.au](https://automta.au)
            
            > Requiere macOS 13 Ventura o superior
            
          files: |
            automta-mac/release/*.dmg
            automta-mac/release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Notify on success ───────────────────────────────────────────────────────
  notify:
    name: Notify Release
    needs: build-mac
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 📣 Log success
        run: |
          echo "✅ AutoMTA Mac ${{ github.ref_name }} released successfully!"
          echo "📥 Download at: https://github.com/${{ github.repository }}/releases/latest"
